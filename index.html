<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>刻痕 · 遗忘的文字</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'SimSun', 'Songti SC', 'Noto Serif SC', serif;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #wrap {
    position: relative;
    width: 960px; height: 640px;
    border: 1px solid #2a2a2a;
  }
  canvas {
    display: block;
    width: 960px; height: 640px;
    background: #0a0a0a;
    cursor: crosshair;
  }
  #hint {
    position: absolute;
    bottom: 4px; left: 8px;
    color: #888;
    font-size: 11px;
    pointer-events: none;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="960" height="640"></canvas>
  <div id="hint">WASD 移动 · E 交互 · 空格 冲刺</div>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
